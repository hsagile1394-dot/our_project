<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>飲み会精算アプリ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍺 飲み会精算アプリ</h1>

<div class="settings">



<label>合計金額</label>
<input type="number" id="totalAmount" placeholder="例: 50000">

<label>丸め単位</label>
<select id="roundUnit">
<option value="1">1円</option>
<option value="10">10円</option>
<option value="100" selected>100円</option>
<option value="1000">1000円</option>
</select>

</div>

<h2>メンバー</h2>

<table id="memberTable">
<thead>
<tr>
<th>名前</th>
<th>役職</th>
<th>支払額</th>
</tr>
</thead>
<tbody id="memberBody"></tbody>
</table>

<button id="addMember">メンバー追加</button>

<div class="actions">
<button id="calculate">計算する</button>
</div>

<h2>結果</h2>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
