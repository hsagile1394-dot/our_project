<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>飲み会精算アプリ</title>

<style>
body{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #eef2f7, #f8fbff);
  padding:30px;
  max-width:1100px;
  margin:auto;
}

/* タイトル */
h1{
  text-align:center;
  margin-bottom:30px;
  color:#2c3e50;
}

/* カード */
.settings, .actions, #result{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* フォーム */
.settings{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  align-items:center;
}

label{
  font-size:13px;
  color:#666;
}

input,select{
  padding:8px 10px;
  border-radius:8px;
  border:1px solid #dcdfe6;
  font-size:14px;
}

input:focus, select:focus{
  outline:none;
  border-color:#3498db;
  box-shadow:0 0 0 2px rgba(52,152,219,0.2);
}

/* テーブル */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

th,td{
  padding:10px;
  text-align:center;
}

th{
  background: linear-gradient(135deg, #2c3e50, #34495e);
  color:white;
}

tr:nth-child(even){
  background:#f9fbfd;
}

tr:hover{
  background:#eef6ff;
}

/* 幹事 */
tr.organizer{
  background:#fff3cd !important;
  font-weight:bold;
}

/* ボタン */
button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-size:14px;
  cursor:pointer;
  background:#3498db;
  color:white;
  transition:0.2s;
}

button:hover{
  background:#2980b9;
  transform:translateY(-1px);
}

/* 色分け */
#selectAllGeneral{ background:#9b59b6; }
#deselectAllGeneral{ background:#95a5a6; }
#addMember{ background:#2ecc71; }
#calculate{
  background:linear-gradient(135deg,#e67e22,#f39c12);
  font-size:16px;
  padding:12px 20px;
}

/* 支払額 */
td:nth-child(5){
  font-weight:bold;
  font-size:16px;
}

/* 結果 */
#result{
  font-size:20px;
  text-align:center;
  border-left:6px solid #3498db;
  font-weight: 700;
}

/* スマホ */
@media (max-width:600px){
  .settings{
    flex-direction:column;
    align-items:flex-start;
  }
  button{
    width:100%;
  }
}
</style>

</head>

<body>

<h1>🍺 飲み会精算アプリ</h1>

<div class="settings">
  <input type="hidden" id="maxMembers" value="100">

  <label>合計金額</label>
  <input type="number" id="totalAmount">

  <label>丸め単位</label>
  <select id="roundUnit">
    <option value="100" selected>100円</option>
    <option value="500">500円</option>
  </select>

  <label>
    <input type="checkbox" id="useCommFee">
    管理職コミュニケーション費
  </label>
</div>

<h2>メンバー</h2>

<div class="member-controls">
  <button id="selectAllGeneral">全選択</button>
  <button id="deselectAllGeneral">全解除</button>
</div>

<table>
<thead>
<tr>
  <th>名前</th>
  <th>役職</th>
  <th>幹事</th>
  <th>一般費</th>
  <th>支払額</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="memberBody"></tbody>
</table>

<button id="addMember">＋ メンバー追加</button>

<div class="actions">
  <button id="calculate">💰 計算する</button>
</div>

<h2>結果</h2>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
