<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>kanta</title>
</head>
<body>
     <div>
        <h1>自己紹介</h1>
        <p>出身：福島県</p>
        <p>入社年数：1年目</p>
        <p>一言：日々成長できるよう頑張っています！</p>
    </div>
<div>
     <h1>ラッキーカラー診断</h1>
    <p>1〜9の数字を入力してください：</p>
    
    <input type="number" id="numInput" min="1" max="9">
    <button onclick="showLuckyColor()">診断する</button>

    <p id="result"></p>

    <script>
        // 数字に対応するラッキーカラーのマップ
        const colorMap = {
            1: "赤",
            2: "青",
            3: "黄",
            4: "緑",
            5: "紫",
            6: "オレンジ",
            7: "ピンク",
            8: "黒",
            9: "白"
        };

        // 🔹 数字を受け取ってHTMLに結果を返すメソッド
        function showLuckyColor() {
            // 入力値を取得
            const num = Number(document.getElementById("numInput").value);

            // 1〜9の範囲チェック
            if (num < 1 || num > 9 || isNaN(num)) {
                document.getElementById("result").textContent = "1〜9の数字を入力してください。";
                return;
            }

            // 対応するラッキーカラーを取得
            const luckyColor = colorMap[num];

            // HTMLに表示
            document.getElementById("result").textContent = `あなたのラッキーカラーは ${luckyColor} です！`;
        }
    </script>

   </div> 
    <a href="index.html">戻る</a>
</body>
</html>
